# Reusable Plumbline gate workflow.
# In any repo:   uses: MW8-ai/plumbline/.github/workflows/plumbline.yml@v0.1.0
# Least privilege: read-only token; LLM review needs only a repo secret.
name: plumbline
on:
  workflow_call:
    inputs:
      llm_review:
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install harness and scanners
        run: |
          pip install "plumbline[scanners] @ git+https://github.com/MW8-ai/plumbline@main"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Restore LLM verdict cache
        if: inputs.llm_review == true
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .plumbline/cache
          key: plumbline-llm-${{ github.repository }}
      - name: Run gates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_REVIEW: ${{ inputs.llm_review }}
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          if [ "$LLM_REVIEW" = "true" ]; then
            plumbline check --llm --base-ref "origin/$BASE_REF"
          else
            plumbline check
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: plumbline-report
          path: .plumbline/report.*
