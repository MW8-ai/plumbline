# Reusable Plumbline gate workflow.
# In any repo:   uses: MW8-ai/plumbline/.github/workflows/plumbline.yml@v0.1.0
# Least privilege: read-only token; LLM review needs only a repo secret.
name: plumbline
on:
  workflow_call:
    inputs:
      llm_review:
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Prevent redundant concurrent runs on the same ref.
concurrency:
  group: plumbline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install harness and scanners
        run: |
          if [ "$GITHUB_REPOSITORY" = "MW8-ai/plumbline" ]; then
            pip install ".[scanners]"
          else
            pip install "plumbline[scanners] @ git+https://github.com/MW8-ai/plumbline@main"
          fi
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Restore LLM verdict cache
        if: inputs.llm_review == true
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .plumbline/cache
          key: plumbline-llm-${{ github.repository }}
      - name: Run gates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_REVIEW: ${{ inputs.llm_review }}
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          if [ "$LLM_REVIEW" = "true" ]; then
            plumbline check --llm --base-ref "origin/$BASE_REF"
          else
            plumbline check
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plumbline-report
          path: .plumbline/report.*
