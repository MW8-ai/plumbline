# Weekly self-check: are the scanners and rule sources current?
# Deliberately does NOT auto-merge anything. It opens an issue; a human decides.
name: self-update-check
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Least-privilege baseline: no permissions by default at workflow level.
permissions: {}

# Prevent concurrent runs so stale checks don't pile up.
concurrency:
  group: self-update-check
  cancel-in-progress: true

jobs:
  freshness:
    name: freshness
    runs-on: ubuntu-latest
    # Scoped to the minimum needed: read source, write issues.
    permissions:
      contents: read # to check out the repo and read plumbline.yml
      issues: write # to file the staleness issue when a scanner pin is behind
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Compare pinned gitleaks version to latest release
        id: check
        run: |
          latest=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          pinned=$(grep -oP 'gitleaks/releases/download/\Kv[0-9.]+' .github/workflows/plumbline.yml | head -1)
          echo "latest=$latest pinned=$pinned"
          if [ "$latest" != "$pinned" ]; then echo "stale=true" >> "$GITHUB_OUTPUT"; fi
      - name: Open issue if stale
        if: steps.check.outputs.stale == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: "Plumbline self-update: pinned scanner version is stale",
              body: "gitleaks pin in plumbline.yml is behind the latest release. Also review: OWASP LLM Top 10 and NIST AI RMF GenAI Profile for rule updates."
            })
